<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agro Jump</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22V9"/><path d="M12 9c0-3 2-5 6-5 0 4-3 6-6 6z"/>
          <path d="M12 13c0-3-2-5-6-5 0 4 3 6 6 6z"/>
        </svg>
      </div>
      <div class="brand-name">Agro <span style="color:var(--green)">Jump</span></div>
    </div>
    <div class="user-chip">
      <span class="role-badge" id="roleBadge">—</span>
      <button class="logout-btn" id="logout">خروج</button>
    </div>
  </header>
  <div class="body">
    <nav class="nav" id="nav"></nav>
    <main class="main" id="view"></main>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
